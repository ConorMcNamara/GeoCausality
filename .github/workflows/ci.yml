name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint and Format Check
    needs: python-versions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.python-versions.outputs.min-version }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff zuban

      - name: Run ruff format check
        run: ruff format --check .

      - name: Run ruff linting
        run: ruff check .

      - name: Run zuban type checking
        run: zuban check GeoCausality

  python-versions:
    name: Derive supported Python versions
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.baipp.outputs.supported_python_classifiers_json_array }}
      min-version: ${{ steps.min.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Reads the "Programming Language :: Python :: X.Y" trove classifiers from
      # pyproject.toml and emits them as a JSON array, so the test matrix stays in
      # sync with the single source of truth. Update the classifiers to add/drop a version.
      - name: Inspect package for supported Python versions
        id: baipp
        uses: hynek/build-and-inspect-python-package@v2

      # Lowest supported version (version-aware sort so 3.9 < 3.10), used to pin
      # a single coverage upload without hardcoding a version number.
      - name: Determine lowest supported Python version
        id: min
        run: |
          version=$(echo '${{ steps.baipp.outputs.supported_python_classifiers_json_array }}' \
            | jq -r '.[]' | sort -V | head -n1)
          echo "version=$version" >> "$GITHUB_OUTPUT"

  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    needs: python-versions
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ${{ fromJSON(needs.python-versions.outputs.versions) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          # Harmless for stable releases; lets the newest classifier build before its final release.
          allow-prereleases: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=GeoCausality --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == needs.python-versions.outputs.min-version
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  docs:
    name: Build docs
    needs: python-versions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.python-versions.outputs.min-version }}

      - name: Install package and docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install -r docs/requirements.txt

      - name: Build docs (warnings as errors)
        run: sphinx-build -b html -W --keep-going docs docs/_build/html

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
