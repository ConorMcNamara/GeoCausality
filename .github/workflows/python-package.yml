# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_linux:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14" ] # Specify the Python versions you want to test against
        os: [ ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install ruff pytest pytest-cov
        pip install .
    - name: Lint with ruff
      run: |
        ruff check .
    - name: Test with pytest
      run: |
        pytest --cov=GeoCausality --cov-report=xml --cov-report=term-missing
    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  build_windows:
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.13", "3.14" ]
        os: [ windows-latest ] # Changed to windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pwsh -Command "
            python -m pip install --upgrade pip;
            python -m pip install ruff pytest pytest-cov;
            pip install .
          "
        shell: pwsh

      - name: Lint with ruff
        run: |
          ruff check .
        shell: pwsh # Added shell: pwsh

      - name: Test with pytest
        run: |
          pytest --cov=GeoCausality --cov-report=term-missing
        shell: pwsh # Added shell: pwsh
